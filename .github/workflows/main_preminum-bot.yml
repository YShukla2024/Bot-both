# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Python app to Azure Web App - Preminum-Bot

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python version
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Create and Start virtual environment and Install dependencies
        run: |
          python -m venv antenv
          source antenv/bin/activate
          pip install -r requirements.txt
                
      - name: Upload artifact for deployment jobs
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: |
            .
            !antenv/

  deploy-azure:
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: python-app
      
      - name: 'Deploy to Azure Web App'
        uses: azure/webapps-deploy@v3
        id: deploy-to-webapp
        with:
          app-name: 'Preminum-Bot'
          slot-name: 'Production'
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_15D3661BCF5441CC8D801EE9EA02C43C }}

  # ================== WINDOWS VM DEPLOYMENT (Self-Hosted Runner) ==================
  # SETUP REQUIRED: Install GitHub Actions runner on Windows VM first
  # See: WINDOWS_VM_SETUP.md
  
  deploy-vm:
    runs-on: [self-hosted, windows]
    needs: build
    if: success()
    
    steps:
      - uses: actions/checkout@v4
      
      - name: 'Set up Python'
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: 'Deploy to Windows VM'
        shell: pwsh
        run: |
          Write-Host "📡 Deploying to Windows VM..."
          
          # Navigate to project directory
          cd C:\PREMIUM_BOT
          Write-Host "📁 Working directory: $(Get-Location)"
          
          # Pull latest code
          Write-Host "📡 Pulling latest code..."
          git pull origin main
          if ($LASTEXITCODE -ne 0) {
            Write-Host "❌ Git pull failed"
            exit 1
          }
          
          # Install dependencies
          Write-Host "📦 Installing dependencies..."
          pip install -r requirements.txt
          if ($LASTEXITCODE -ne 0) {
            Write-Host "❌ Pip install failed"
            exit 1
          }
          
          # Restart bot service
          Write-Host "🔄 Restarting bot service..."
          try {
            # Stop service
            net stop telegram-bot
            Start-Sleep -Seconds 2
            
            # Start service
            net start telegram-bot
            Write-Host "✅ Service restarted successfully"
          } catch {
            Write-Host "⚠️ Service restart failed: $_"
            Write-Host "Try restarting manually via Services.msc or Task Manager"
          }
          
          Write-Host "✅ VM deployment complete"

  # ================== NOTIFICATION ==================
  
  notify:
    runs-on: ubuntu-latest
    needs: [deploy-azure, deploy-vm]
    if: always()
    
    steps:
      - name: Deployment Status
        run: |
          echo "================================"
          echo "🚀 DEPLOYMENT COMPLETE"
          echo "================================"
          echo "✅ Azure App Service: Deployed"
          echo "✅ Windows VM: Deployed"
          echo "================================"